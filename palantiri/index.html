/* ── Étoiles ── */
#stars{position:fixed;inset:0;z-index:2;pointer-events:none}

/* ── Nav retour ── */
.nav-home{
  position:fixed;top:1.1rem;left:1.1rem;z-index:100;
  display:inline-flex;align-items:center;gap:0.4rem;
  padding:0.45rem 0.9rem;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,0.12);
  border-radius:999px;
  font-family:'Jost',sans-serif;
  font-size:0.82rem;font-weight:400;letter-spacing:0.03em;
  color:rgba(255,255,255,0.7);
  text-decoration:none;
  transition:all 0.3s ease;
}
.nav-home:hover{
  background:rgba(255,255,255,0.14);
  color:rgba(255,255,255,0.95);
  border-color:rgba(255,255,255,0.25);
}

/* ── Login container ── */
.login-container{
  position:relative;z-index:10;
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;min-height:100dvh;
  padding:1.5rem;
}

.login-card{
  width:100%;max-width:360px;
  display:flex;flex-direction:column;align-items:center;
  animation:fadeUp 1.2s ease both;
}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(24px)}
  to{opacity:1;transform:translateY(0)}
}

/* ── Palantír icon ── */
.palantir-icon{
  margin-bottom:1.6rem;
  animation:pulse-glow 4s ease-in-out infinite;
}
@keyframes pulse-glow{
  0%,100%{filter:drop-shadow(0 0 6px rgba(160,184,255,0.2))}
  50%{filter:drop-shadow(0 0 18px rgba(160,184,255,0.5))}
}

/* ── Titre ── */
.login-title{
  font-family:'Cormorant Garamond',serif;
  font-weight:300;font-style:italic;
  font-size:clamp(1.6rem,5vw,2.2rem);
  color:#fff;
  text-align:center;
  letter-spacing:0.04em;
  line-height:1.2;
  margin-bottom:0.5rem;
  text-shadow:0 0 40px rgba(160,184,255,0.25), 0 0 80px rgba(160,184,255,0.08);
}
.login-subtitle{
  font-family:'Jost',sans-serif;
  font-size:0.78rem;font-weight:300;
  letter-spacing:0.18em;text-transform:uppercase;
  color:rgba(255,255,255,0.55);
  margin-bottom:2.4rem;
}

/* ── Champs ── */
.form-group{width:100%;margin-bottom:1rem}
.form-group input{
  width:100%;
  padding:0.85rem 1.1rem;
  background:rgba(255,255,255,0.07);
  border:1px solid rgba(255,255,255,0.38);
  border-radius:8px;
  font-family:'Jost',sans-serif;
  font-size:0.95rem;font-weight:300;
  color:#fff;
  letter-spacing:0.02em;
  outline:none;
  transition:all 0.35s ease;
}
.form-group input::placeholder{
  color:rgba(255,255,255,0.5);
  font-weight:300;
}
.form-group input:focus{
  border-color:rgba(160,184,255,0.7);
  background:rgba(160,184,255,0.08);
  box-shadow:0 0 0 3px rgba(160,184,255,0.12), inset 0 0 20px rgba(160,184,255,0.04);
}

/* ── Bouton ── */
.btn-entrer{
  position:relative;
  width:100%;
  margin-top:0.8rem;
  padding:0.85rem 1.1rem;
  background:rgba(255,255,255,0.1);
  border:1px solid rgba(255,255,255,0.35);
  border-radius:8px;
  font-family:'Jost',sans-serif;
  font-size:0.95rem;font-weight:400;
  letter-spacing:0.08em;
  color:#fff;
  cursor:pointer;
  overflow:hidden;
  transition:all 0.35s ease;
}
.btn-entrer:hover{
  background:rgba(160,184,255,0.12);
  border-color:rgba(160,184,255,0.4);
  box-shadow:0 0 24px rgba(160,184,255,0.1);
}
.btn-entrer:active{transform:scale(0.985)}
.btn-text{position:relative;z-index:1}
.btn-glow{
  position:absolute;inset:0;
  background:radial-gradient(circle at 50% 50%, rgba(160,184,255,0.15) 0%, transparent 70%);
  opacity:0;transition:opacity 0.4s ease;
}
.btn-entrer:hover .btn-glow{opacity:1}

/* ── Shake ── */
@keyframes shake{
  0%,100%{transform:translateX(0)}
  15%{transform:translateX(-8px)}
  30%{transform:translateX(7px)}
  45%{transform:translateX(-6px)}
  60%{transform:translateX(4px)}
  75%{transform:translateX(-2px)}
}
.shake{animation:shake 0.55s ease}

/* ── Erreur ── */
.erreur{
  margin-top:1.2rem;
  font-family:'Jost',sans-serif;
  font-size:0.95rem;font-weight:400;
  color:rgba(255,130,110,0.95);
  text-align:center;
  opacity:0;transform:translateY(6px);
  transition:all 0.4s ease;
  pointer-events:none;
}
.erreur.visible{opacity:1;transform:translateY(0)}

/* ── Footer ── */
footer{
  position:fixed;bottom:0;left:0;right:0;z-index:10;
  display:flex;align-items:center;justify-content:center;
  padding:1rem 1.5rem 1.2rem;
}
.footer-credit-text{
  font-family:'Jost',sans-serif;
  font-size:0.72rem;font-weight:300;
  letter-spacing:0.04em;
  color:rgba(255,255,255,0.3);
}

/* ── Mobile ── */
@media(max-width:480px){
  .nav-home{top:0.7rem;left:0.7rem;font-size:0.75rem;padding:0.4rem 0.75rem}
  .login-card{max-width:320px}
  .palantir-icon{margin-bottom:1.2rem}
  .palantir-icon svg{width:44px;height:44px}
  .login-subtitle{margin-bottom:1.8rem}
}
@media(max-height:600px){
  .palantir-icon{margin-bottom:0.8rem}
  .palantir-icon svg{width:36px;height:36px}
  .login-title{font-size:1.4rem}
  .login-subtitle{margin-bottom:1.2rem}
}
</style>

<script>
(function(){
  var c=document.getElementById('stars'),x=c.getContext('2d');
  function resize(){c.width=window.innerWidth;c.height=window.innerHeight;}
  resize(); window.addEventListener('resize',resize);
  var stars=[];
  for(var i=0;i<70;i++) stars.push({
    x:Math.random()*2000, y:Math.random()*2000,
    r:Math.random()*1.2+0.3, o:Math.random()*0.4+0.1,
    s:Math.random()*0.008+0.003
  });
  function draw(t){
    x.clearRect(0,0,c.width,c.height);
    for(var i=0;i<stars.length;i++){
      var s=stars[i], ox=s.o+Math.sin(t*s.s+i)*0.25;
      if(ox<0) ox=0;
      x.beginPath();
      x.arc(s.x%c.width, s.y%c.height, s.r, 0, Math.PI*2);
      x.fillStyle='rgba(160,184,255,'+ox+')';
      x.fill();
    }
    requestAnimationFrame(draw);
  }
  requestAnimationFrame(draw);
})();

      return;
    }
    showErreur('Vous ne passerez pas \u{1F609}');
    btn.classList.add('shake');
    setTimeout(function(){btn.classList.remove('shake');},600);
  }

  function showErreur(msg){
    errDiv.textContent=msg;
    errDiv.classList.add('visible');
    setTimeout(function(){errDiv.classList.remove('visible');},4000);
  }

  btn.addEventListener('click',tentative);
  pwInput.addEventListener('keydown',function(e){if(e.key==='Enter')tentative();});
  idInput.addEventListener('keydown',function(e){if(e.key==='Enter')pwInput.focus();});
})();
</script>
</body>
</html>
